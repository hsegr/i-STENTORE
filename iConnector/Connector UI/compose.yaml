services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: ds_connector_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - ds_connector_network
    volumes:
      - ./pg_data:/var/lib/postgresql
      - ./pg_logs:/var/log/postgresql
    command: >
      postgres 
        -c logging_collector=on 
        -c log_directory=/var/log/postgresql 
        -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
        -c log_destination=stderr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-server
    container_name: ds_connector_api_server
    environment:
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${API_SERVER_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - ds_connector_network
    depends_on:
      postgres:
        condition: service_healthy

  client-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: client-web
    container_name: ds_connector_web_app
    ports:
      - "${CLIENT_WEB_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - ds_connector_network
    depends_on:
      - api-server

networks:
  ds_connector_network:
    name: ds_connector_net
    driver: bridge
