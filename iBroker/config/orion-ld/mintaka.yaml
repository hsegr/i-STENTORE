services:
  timescaledb:
    image: timescale/timescaledb-postgis:${TIMESCALE_VERSION}
    container_name: istentore_timescaledb
    volumes:
      - ./data_timescaledb:/var/lib/postgresql/data
    ports:
      - "${EXPOSED_TIMESCALE_PORT}:${TIMESCALE_PORT}"
    environment:
      - POSTGRES_USER=orion
      - POSTGRES_PASSWORD=orion
      - POSTGRES_HOST_AUTH_METHOD=trust
    restart: unless-stopped
    networks:
      - istentore_network

  mintaka:
    image: fiware/mintaka:${MINTAKA_VERSION}
    container_name: istentore_mintaka
    ports:
      - "${EXPOSED_MINTAKA_PORT}:${MINTAKA_PORT}"
    depends_on:
      - timescaledb
    environment:
      - MICRONAUT_SERVER_PORT=${MINTAKA_PORT}
      - DATASOURCES_DEFAULT_HOST=timescaledb
      - DATASOURCES_DEFAULT_USERNAME=orion
      - DATASOURCES_DEFAULT_PASSWORD=orion
      - DATASOURCES_DEFAULT_DATABASE=orion
      - DATASOURCES_DEFAULT_MAXIMUM_POOL_SIZE=2
      - DATASOURCES_DEFAULT_PORT=${TIMESCALE_PORT}
      - ENDPOINTS_INFO_ENABLED=true
      - ENDPOINTS_INFO_SENSITIVE=false
    restart: unless-stopped
    networks:
      - istentore_network
