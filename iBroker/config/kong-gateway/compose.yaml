services:
  kong:
    build:
      context: ..
      dockerfile: kong-gateway/Dockerfile
    container_name: istentore_kong
    environment:
      KONG_DATABASE: "off" 
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: konguser
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PLUGINS: bundled,pep-plugin,validator-plugin
      KONG_PLUGINSERVER_NAMES: pep-plugin,python-plugin
      KONG_PLUGINSERVER_PEP_PLUGIN_SOCKET: /usr/local/kong/pep-plugin.socket
      KONG_PLUGINSERVER_PEP_PLUGIN_START_CMD: /usr/local/kong/go-plugins/pep-plugin
      KONG_PLUGINSERVER_PEP_PLUGIN_QUERY_CMD: /usr/local/kong/go-plugins/pep-plugin -dump
      KONG_PLUGINSERVER_PYTHON_PLUGIN_SOCKET: /usr/local/kong/python_pluginserver.sock
      KONG_PLUGINSERVER_PYTHON_PLUGIN_START_CMD: /usr/bin/kong/python-pluginserver/kong-pluginserver.py --no-lua-style --plugins-directory /usr/local/kong/python-plugins
      KONG_PLUGINSERVER_PYTHON_PLUGIN_QUERY_CMD: /usr/bin/kong/python-pluginserver/kong-pluginserver.py --no-lua-style --plugins-directory /usr/local/kong/python-plugins --dump-all-plugins
      KONG_LOG_LEVEL: debug
    ports:
      - "18028:8000"    
      - "18027:8001"
    volumes:
      - "./kong.yml:/kong/declarative/kong.yml"
    restart: unless-stopped
    networks:
      - istentore_network
  
networks:
  istentore_network:
    name: istentore_net
    external: true
